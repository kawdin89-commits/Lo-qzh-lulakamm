<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memories Garden 🌸</title>

<link rel="stylesheet" href="memories.css">

</head>

<body>

<div class="sky"></div>

<div class="garden">

<h1>🌸 Memories Garden 🌸</h1>

<p class="subtitle">

Every flower hides a little memory...

Touch one gently. 🤍

</p>

<div class="flowers">

<div class="flower" onclick="showMemory(0)">
🌷
</div>

<div class="flower" onclick="showMemory(1)">
🌸
</div>

<div class="flower" onclick="showMemory(2)">
🌹
</div>

<div class="flower" onclick="showMemory(3)">
🌼
</div>

<div class="flower" onclick="showMemory(4)">
💮
</div>

<div class="flower" onclick="showMemory(5)">
🌺
</div>

</div>

<div id="memoryBox" class="memory-box">

<h2>🤍</h2>

<p id="memoryText">

Choose a flower...

</p>

</div>

<button class="next-btn" onclick="nextPage()">

Continue To Photo Album 📸

</button>

</div>

<script src="memories.js"></script>

</body>

</html>
